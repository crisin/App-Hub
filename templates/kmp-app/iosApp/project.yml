name: iosApp
options:
  bundleIdPrefix: com.crisin.kmpapp
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - iosApp
    settings:
      base:
        INFOPLIST_FILE: iosApp/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.crisin.kmpapp
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        # Signing — set your team ID here so xcodegen preserves it.
        # Find yours: security find-certificate -a -c "Apple Development" -Z | grep "subj"
        # Look for the OU= field (10-char alphanumeric string).
        DEVELOPMENT_TEAM: ZD496H44F3
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        # Framework search path for the shared KMP framework.
        # embedAndSignAppleFrameworkForXcode outputs here, parameterized
        # by Xcode's CONFIGURATION and SDK_NAME build variables.
        FRAMEWORK_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)"
        OTHER_LINKER_FLAGS:
          - "$(inherited)"
          - "-framework"
          - "shared"
    dependencies:
      # The KMP static framework uses SQLite (via SQLDelight NativeSqliteDriver)
      # but doesn't bundle it — the app must link the system library.
      - sdk: libsqlite3.tbd
    preBuildScripts:
      - name: "Build Kotlin Framework"
        script: |
          # JAVA_HOME is needed by gradlew but isn't in Xcode's environment.
          # Try the user's shell profile, then common Homebrew paths.
          if [ -z "${JAVA_HOME:-}" ]; then
            for jdk in /opt/homebrew/opt/openjdk@17 /usr/local/opt/openjdk@17 \
                       /opt/homebrew/opt/openjdk /usr/local/opt/openjdk; do
              if [ -d "$jdk" ]; then
                export JAVA_HOME="$jdk"
                export PATH="$JAVA_HOME/bin:$PATH"
                break
              fi
            done
          fi
          cd "$SRCROOT/.."
          ./gradlew :shared:embedAndSignAppleFrameworkForXcode
        basedOnDependencyAnalysis: false
